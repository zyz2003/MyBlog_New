version: '3.8'

services:
  blog:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: my-blog
    ports:
      - "3000:3000"
    volumes:
      - blog-data:/app/apps/site/data
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/apps/site/data/blog.db
    restart: unless-stopped

volumes:
  blog-data:
    driver: local

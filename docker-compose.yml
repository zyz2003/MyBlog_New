version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: my-blog-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: my_blog
      MYSQL_USER: blog
      MYSQL_PASSWORD: blog123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  blog:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: my-blog
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=blog
      - DB_PASSWORD=blog123
      - DB_NAME=my_blog
      - JWT_SECRET=my-blog-secret-key-change-in-production
    depends_on:
      - mysql
    restart: unless-stopped

volumes:
  mysql-data:
    driver: local
  blog-data:
    driver: local
